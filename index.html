<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#ffffff; --bg2:#f5f5f4; --bg3:#ececea; --text:#111110; --text2:#6b6b68;
  --text3:#b0b0ad; --border:#e8e8e5; --border2:#d4d4d0; --accent:#111110;

}
@media (prefers-color-scheme: dark) {
  :root { --bg:#111110; --bg2:#1c1c1b; --bg3:#272726; --text:#f0efed; --text2:#9a9a97;

}
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; background:var(--bg2); color:var(--text); min-height:100vh; font-size:14px; -webkit-font-smoothing:antialiased; }

/* ── LOCK SCREEN ── */

.lock-box { background:var(--bg); border:1px solid var(--border); border-radius:var(--r); padding:32px 28px; width:100%; max-width:300px; text-align:center; box-shadow:0 4px 16px rgba(0,0,0,0.06); }
.lock-logo { font-size:22px; font-weight:800; letter-spacing:-0.04em; color:var(--text); line-height:1; padding:7px 12px; border:1.5px solid var(--text); border-radius:6px; display:inline-block; margin-bottom:18px; }
.lock-title { font-size:13px; color:var(--text2); margin-bottom:16px; }
.pin-input { width:100%; font-size:24px; letter-spacing:12px; text-align:center; padding:12px; border:1px solid var(--border2); border-radius:var(--r-sm); background:var(--bg2); color:var(--text); font-family:inherit; margin-bottom:12px; }
.pin-input:focus { outline:none; border-color:var(--text2); }
.lock-error { color:var(--danger); font-size:12px; margin-bottom:10px; display:none; }
.lock-btn { width:100%; padding:10px; border:none; border-radius:var(--r-sm); background:var(--accent); color:var(--accent-t); font-size:13px; font-weight:500; cursor:pointer; font-family:inherit; }

/* ── TOP BAR ── */

.logo { font-size:18px; font-weight:800; letter-spacing:-0.04em; color:var(--text); line-height:1; padding:5px 9px; border:1.5px solid var(--text); border-radius:5px; flex-shrink:0; }

.main { max-width:600px; margin:0 auto; padding:20px 14px 40px; }
.notice { background:var(--bg3); border:1px solid var(--border2); border-radius:var(--r-sm); padding:10px 12px; font-size:12px; color:var(--text2); margin-bottom:14px; line-height:1.5; }

.install-banner { display:none; align-items:center; gap:10px; background:var(--bg); border:1px solid var(--border2); border-radius:var(--r-sm); padding:10px 12px; margin-bottom:14px; }

.install-dismiss { background:none; border:none; color:var(--text3); font-size:16px; cursor:pointer; padding:2px 4px; line-height:1; }

.tabs-row { display:flex; align-items:center; gap:8px; margin-bottom:14px; }
.tabs { display:flex; gap:5px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; flex:1; }
.tabs::-webkit-scrollbar { display:none; }
.tab { flex-shrink:0; padding:6px 13px; border-radius:20px; border:1px solid var(--border2); background:var(--bg); color:var(--text2); font-size:12px; font-weight:500; cursor:pointer; transition:all .13s; white-space:nowrap; -webkit-tap-highlight-color:transparent; letter-spacing:.01em; }
.tab.active { background:var(--accent); color:var(--accent-t); border-color:var(--accent); }

.section { display:none; }

.card-title { font-size:15px; font-weight:700; color:var(--text); letter-spacing:-0.01em; }
.tab-dot { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:5px; vertical-align:middle; flex-shrink:0; }
.edit-btn { background:var(--bg2); border:1px solid var(--border2); color:var(--text2); cursor:pointer; font-size:11px; width:20px; height:20px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; -webkit-tap-highlight-color:transparent; flex-shrink:0; }

.header-btns { display:flex; gap:6px; flex-shrink:0; flex-wrap:wrap; }

.deadline-row { display:flex; align-items:center; gap:8px; padding:10px 14px; border-bottom:1px solid var(--border); background:var(--bg2); }
.deadline-row label { font-size:12px; color:var(--text2); }
.deadline-row input[type=time] { font-size:13px; padding:5px 8px; border:1px solid var(--border2); border-radius:var(--r-sm); background:var(--bg); color:var(--text); font-family:inherit; }
.deadline-row input[type=time]:focus { outline:none; border-color:var(--text2); }

table { width:100%; border-collapse:collapse; }
thead th { font-size:10px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:.07em; padding:8px 12px; text-align:left; background:var(--bg2); border-bottom:1px solid var(--border); }

tbody tr { border-bottom:1px solid var(--border); transition:background .15s; }

tbody tr.has-qty { background:rgba(22,163,74,0.13); box-shadow:inset 3px 0 0 var(--green); }
td { padding:0; font-size:14px; color:var(--text); vertical-align:middle; }
td a { color:var(--info); text-decoration:none; font-size:13px; }
td a:hover { text-decoration:underline; }
.empty-state { display:none; padding:22px 14px; text-align:center; font-size:12px; color:var(--text3); }

.cell-input { width:100%; padding:9px 12px; font-size:14px; color:var(--text); background:transparent; border:none; outline:none; font-family:inherit; }
.cell-input:focus { background:var(--bg2); }
.td-unit { width:56px; }
.td-unit .cell-input { text-align:center; color:var(--text2); font-size:12px; padding:9px 4px; }
.td-qty { width:68px; }
.td-qty input[type=number] { width:52px; font-size:13px; padding:5px 6px; border:1px solid var(--border2); border-radius:var(--r-sm); background:var(--bg); color:var(--text); text-align:center; font-family:inherit; -moz-appearance:textfield; display:block; margin:0 auto; }
.td-qty input[type=number]::-webkit-outer-spin-button,.td-qty input[type=number]::-webkit-inner-spin-button { -webkit-appearance:none; }
.td-qty input[type=number]:focus { outline:none; border-color:var(--text2); }
.td-del { width:38px; }
.del-btn { background:none; border:none; cursor:pointer; color:var(--text3); padding:8px; display:flex; align-items:center; justify-content:center; width:100%; transition:color .13s; -webkit-tap-highlight-color:transparent; }
.del-btn:active { color:var(--danger); }

.add-row { display:flex; gap:6px; padding:10px 12px; border-top:1px solid var(--border); background:var(--bg2); align-items:center; flex-wrap:wrap; }
.add-row input[type=text] { flex:1; min-width:80px; font-size:13px; padding:7px 10px; border:1px solid var(--border2); border-radius:var(--r-sm); background:var(--bg); color:var(--text); font-family:inherit; }
.add-row input[type=text]:focus { outline:none; border-color:var(--text2); }
.add-row input[type=text]::placeholder { color:var(--text3); }
.add-row .uf { width:52px; flex:none; }
.add-btn { padding:8px 13px; border:1px solid var(--border2); border-radius:var(--r-sm); background:var(--bg); color:var(--text); font-size:12.5px; font-weight:500; cursor:pointer; white-space:nowrap; flex-shrink:0; font-family:inherit; transition:background .13s; -webkit-tap-highlight-color:transparent; }
.add-btn:active { background:var(--bg3); }

.modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:200; align-items:flex-end; justify-content:center; padding:0; }
@media (min-width:480px) { .modal-bg { align-items:center; padding:20px; } }
.modal-bg.open { display:flex; }
.modal { background:var(--bg); border-radius:var(--r) var(--r) 0 0; border:1px solid var(--border); padding:20px; width:100%; max-width:420px; max-height:80vh; overflow-y:auto; animation:slideup .18s ease; }
@media (min-width:480px) { .modal { border-radius:var(--r); } }
@keyframes slideup { from { transform:translateY(24px); opacity:0; } to { transform:none; opacity:1; } }
.modal-handle { width:36px; height:4px; background:var(--border2); border-radius:2px; margin:0 auto 16px; display:block; }
@media (min-width:480px) { .modal-handle { display:none; } }
.modal h3 { font-size:14px; font-weight:600; color:var(--text); margin-bottom:12px; letter-spacing:-0.01em; }
.modal textarea { width:100%; height:210px; font-size:12px; font-family:'SF Mono','Fira Code','Menlo',monospace; padding:12px; border:1px solid var(--border2); border-radius:var(--r-sm); background:var(--bg2); color:var(--text); resize:none; line-height:1.75; }
.modal textarea:focus { outline:none; }
.modal-footer { display:flex; gap:8px; margin-top:12px; justify-content:flex-end; }
.btn-close,.btn-copy-modal { padding:8px 16px; border-radius:var(--r-sm); font-size:13px; font-family:inherit; cursor:pointer; -webkit-tap-highlight-color:transparent; }
.btn-close { border:1px solid var(--border2); background:none; color:var(--text2); }
.btn-copy-modal { border:none; background:var(--accent); color:var(--accent-t); font-weight:500; display:flex; align-items:center; gap:5px; transition:opacity .13s; }

.history-list { display:flex; flex-direction:column; gap:6px; max-height:50vh; overflow-y:auto; }

/* ── SECTION EDIT MODAL ── */
.form-group { margin-bottom:12px; }
.form-group label { font-size:12px; color:var(--text2); display:block; margin-bottom:4px; }
.form-group input[type=text], .form-group textarea {
  width:100%; font-size:13px; padding:8px 10px; border:1px solid var(--border2); border-radius:var(--r-sm);
  background:var(--bg2); color:var(--text); font-family:inherit; resize:vertical;
}
.form-group input[type=text]:focus, .form-group textarea:focus { outline:none; border-color:var(--text2); }
.checkbox-row { display:flex; align-items:center; gap:7px; font-size:12px; color:var(--text2); margin-bottom:16px; }
.section-modal-footer { display:flex; align-items:center; justify-content:space-between; margin-top:12px; gap:8px; flex-wrap:wrap; }
.btn-delete-section { background:none; border:1px solid var(--danger); color:var(--danger); padding:8px 12px; border-radius:var(--r-sm); font-size:12px; cursor:pointer; font-family:inherit; -webkit-tap-highlight-color:transparent; }
.btn-delete-section:active { background:rgba(220,38,38,0.08); }
</style>

<div class="lock-screen" id="lock-screen">
  <div class="lock-box">
    <div class="lock-logo">VNL</div>
    <div class="lock-title">Введите PIN для входа</div>
    <input type="password" inputmode="numeric" pattern="[0-9]*" maxlength="4" id="pin-input" class="pin-input" placeholder="••••">
    <div class="lock-error" id="lock-error">Неверный PIN, попробуй ещё раз</div>
    <button class="lock-btn" onclick="checkPin()">Войти</button>
  </div>
</div>

<div id="app-root" style="display:none;">

<div class="topbar">
  <div class="logo">VNL</div>
  <div class="topbar-divider"></div>
  <div class="topbar-label">Заказы поставщикам</div>
  <div class="sync-pill"><span class="sync-dot local" id="sync-dot"></span><span id="sync-text">Локально</span></div>
</div>

<div class="main">
  <div class="notice" id="setup-notice" style="display:none;">
    <b>Синхронизация не настроена.</b> Списки хранятся только на этом телефоне. См. файл <b>SETUP.md</b> в архиве.

  <div class="tabs-row">
    <div class="tabs" id="tabs"></div>
    <button class="tab-add-btn" onclick="openSectionEdit(null)" title="Добавить поставщика">+</button>
  </div>

</div>

<div class="modal-bg" id="modal">

    <span class="modal-handle"></span>
    <h3 id="modal-title"></h3>

      <button class="btn-close" onclick="closeModal()">Закрыть</button>
      <button class="btn-copy-modal" id="modal-copy-btn" onclick="copyModal()">Копировать</button>
    </div>

</div>

<div class="modal-bg" id="history-modal">

      <button class="btn-delete-section" id="sec-delete-btn" onclick="deleteSectionConfirm()" style="display:none;">Удалить поставщика</button>
      <div style="display:flex;gap:8px;margin-left:auto;">
        <button class="btn-close" onclick="closeSectionModal()">Отмена</button>

</div>

</div>

<script>
/* =========================================================================
   НАСТРОЙКА СИНХРОНИЗАЦИИ (см. SETUP.md)
   ========================================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyCGfRYkiKbaAF9WjU8_5lEj6zNaqgUPxa8",
  authDomain: "vnl-ord.firebaseapp.com",
  databaseURL: "https://vnl-ord-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "vnl-ord"
};
const SYNC_CONFIGURED = firebaseConfig.apiKey && firebaseConfig.apiKey.indexOf('YOUR_') !== 0;

const LOCAL_KEY = 'vnl_order_v2';
const META_KEY = 'vnl_sections_meta_v1';

/* ---------------- ВХОД ПО PIN ---------------- */
const PIN_CODE = '2401';
const PIN_KEY = 'vnl_pin_ok_v1';

function checkPin(){
  const input = document.getElementById('pin-input');
  if (input.value === PIN_CODE) {
    try { localStorage.setItem(PIN_KEY, '1'); } catch(e){}
    unlockApp();
  } else {
    document.getElementById('lock-error').style.display = 'block';
    input.value = '';
    input.focus();
  }
}

function unlockApp(){
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('app-root').style.display = 'block';
  startApp();
}

function escapeHtml(str){
  return String(str||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------------- ИКОНКИ И ЦВЕТА ВКЛАДОК ---------------- */
const ICON_TRASH = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>';
const ICON_CLOCK = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>';
const ICON_COPY = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
const ICON_CHECK = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';

const TAB_PALETTE = ['#ef4444','#f97316','#eab308','#22c55e','#06b6d4','#3b82f6','#8b5cf6','#ec4899'];
function colorForId(id){
  let hash = 0;
  for (let i=0;i<id.length;i++){ hash = (hash*31 + id.charCodeAt(i)) >>> 0; }
  return TAB_PALETTE[hash % TAB_PALETTE.length];
}

function pluralPositions(n){
  const mod10 = n % 10, mod100 = n % 100;
  if (mod10===1 && mod100!==11) return `${n} позиция`;
  if (mod10>=2 && mod10<=4 && (mod100<10||mod100>=20)) return `${n} позиции`;
  return `${n} позиций`;
}

function pad(n){ return String(n).padStart(3,'0'); }
function seedSectionItems(sid){
  const obj = {};
  (DEFAULT_ITEMS[sid]||[]).forEach((row,i)=>{
    obj['i'+pad(i)] = { name:row[0], unit:row[1], qty:'', order:i, ...(row[2]?{link:row[2]}:{}) };
  });
  return obj;
}

/* SECTIONS — динамический список меты вкладок: {id,label,title,sub,mode,hasLink,hasDeadline,order} */
let SECTIONS = [];
function sectionMeta(sid){ return SECTIONS.find(s=>s.id===sid); }

/* state[sid] = { items:{id:{...}}, deadlineTime:'16:00', history:[{id,at,text}] } */
let state = {};
let localCounters = {};
let sectionRefs = {};
let metaRef = null;

/* ---------------- ПОСТРОЕНИЕ / ОБНОВЛЕНИЕ / УДАЛЕНИЕ ВКЛАДКИ ---------------- */

function insertSortedGeneric(container, el, order){
  el.dataset.order = order;
  const children = Array.from(container.children);
  const next = children.find(c => Number(c.dataset.order) > order);
  if (next) container.insertBefore(el, next); else container.appendChild(el);
}

function buildAddRow(card, meta){
  const old = card.querySelector('.add-row');
  if (old) old.remove();
  const addRow = document.createElement('div');
  addRow.className = 'add-row';
  addRow.innerHTML = `
    <input type="text" id="nn-${meta.id}" placeholder="Новая позиция">
    <input type="text" class="uf" id="nu-${meta.id}" placeholder="шт">
    ${meta.hasLink ? `<input type="text" id="nl-${meta.id}" placeholder="Ссылка">` : ''}
    <button class="add-btn" onclick="addItem('${meta.id}')">+ Добавить</button>`;
  card.appendChild(addRow);
  setTimeout(()=>{
    ['nn-'+meta.id,'nu-'+meta.id,'nl-'+meta.id].forEach(id=>{
      const el = document.getElementById(id);
      if (el) el.addEventListener('keydown', e=>{ if(e.key==='Enter') addItem(meta.id); });
    });
  },0);
}

function buildSectionDOM(meta){
  SECTIONS = SECTIONS.filter(s=>s.id!==meta.id).concat([meta]);

  const tabsEl = document.getElementById('tabs');
  const secsEl = document.getElementById('sections');
  const noActiveYet = !document.querySelector('.tab.active');
  const dotColor = colorForId(meta.id);

  const btn = document.createElement('button');
  btn.className = 'tab' + (noActiveYet ? ' active' : '');
  btn.innerHTML = `<span class="tab-dot" style="background:${dotColor}"></span>${escapeHtml(meta.label)}`;
  btn.dataset.sid = meta.id;
  btn.onclick = () => activateTab(meta.id);
  insertSortedGeneric(tabsEl, btn, meta.order||0);

  const wrap = document.createElement('div');
  wrap.className = 'section' + (noActiveYet ? ' active' : '');
  wrap.dataset.sid = meta.id;

  const card = document.createElement('div');
  card.className = 'card';

  const hdr = document.createElement('div');
  hdr.className = 'card-header';
  hdr.innerHTML = `
    <div>
      <div class="card-title-row"><span class="tab-dot" style="background:${dotColor}"></span><div class="card-title">${escapeHtml(meta.title)}</div><button class="edit-btn" onclick="openSectionEdit('${meta.id}')" title="Изменить вкладку">✎</button></div>
      <div class="card-sub" id="sub-${meta.id}">${escapeHtml(meta.sub||'')}</div>
      <div class="progress-label" id="progress-${meta.id}"></div>
    </div>
    <div class="header-btns">
      <button class="clear-btn" onclick="clearQty('${meta.id}')">${ICON_TRASH} Очистить</button>
      <button class="history-btn" onclick="openHistory('${meta.id}')">${ICON_CLOCK} История</button>
      <button class="copy-btn" id="copy-btn-${meta.id}" onclick="openCopy('${meta.id}')">${ICON_COPY} Копировать</button>
    </div>`;
  card.appendChild(hdr);

  const searchRow = document.createElement('div');
  searchRow.className = 'search-row';
  searchRow.innerHTML = `<input type="text" class="search-input" id="search-${meta.id}" placeholder="Поиск по названию...">`;
  card.appendChild(searchRow);

  if (meta.hasDeadline) {
    const dl = document.createElement('div');
    dl.className = 'deadline-row';
    dl.innerHTML = `<label for="deadline-${meta.id}">Собрать до</label><input type="time" id="deadline-${meta.id}" value="16:00">`;
    card.appendChild(dl);
    setTimeout(()=>{
      document.getElementById(`deadline-${meta.id}`).addEventListener('change', ()=> onDeadlineChange(meta.id));
    },0);
  }

  const tbl = document.createElement('table');
  tbl.innerHTML = `<thead><tr><th>Наименование</th><th class="th-unit">Ед.</th><th class="th-qty">Кол-во</th><th class="th-del"></th></tr></thead>`;
  const tbody = document.createElement('tbody');
  tbody.id = `tbody-${meta.id}`;
  tbl.appendChild(tbody);
  card.appendChild(tbl);

  const emptyState = document.createElement('div');
  emptyState.className = 'empty-state';
  emptyState.id = `empty-${meta.id}`;
  emptyState.textContent = 'Ничего не найдено';
  card.appendChild(emptyState);

  buildAddRow(card, meta);

  wrap.appendChild(card);
  insertSortedGeneric(secsEl, wrap, meta.order||0);

  setTimeout(()=>{
    const searchEl = document.getElementById(`search-${meta.id}`);
    if (searchEl) searchEl.addEventListener('input', ()=> filterRows(meta.id, searchEl.value));
  },0);
}

function updateSectionMeta(meta){
  SECTIONS = SECTIONS.map(s=> s.id===meta.id ? { ...s, ...meta } : s);
  const tabBtn = document.querySelector(`.tab[data-sid="${meta.id}"]`);
  if (tabBtn) tabBtn.innerHTML = `<span class="tab-dot" style="background:${colorForId(meta.id)}"></span>${escapeHtml(meta.label)}`;
  const wrap = document.querySelector(`.section[data-sid="${meta.id}"]`);
  if (wrap) {
    const titleEl = wrap.querySelector('.card-title');
    if (titleEl) titleEl.textContent = meta.title;
    const subEl = document.getElementById(`sub-${meta.id}`);
    if (subEl) subEl.textContent = meta.sub || '';
    const card = wrap.querySelector('.card');
    buildAddRow(card, meta);
  }
}

function removeSectionDOM(sid){
  const tabBtn = document.querySelector(`.tab[data-sid="${sid}"]`);
  const wasActive = tabBtn && tabBtn.classList.contains('active');
  if (tabBtn) tabBtn.remove();
  const wrap = document.querySelector(`.section[data-sid="${sid}"]`);
  if (wrap) wrap.remove();
  SECTIONS = SECTIONS.filter(s=>s.id!==sid);
  if (wasActive) {
    const firstTab = document.querySelector('.tab');
    if (firstTab) activateTab(firstTab.dataset.sid);
  }
}

function activateTab(sid){
  document.querySelectorAll('.tab').forEach(b=> b.classList.toggle('active', b.dataset.sid===sid));
  document.querySelectorAll('.section').forEach(w=> w.classList.toggle('active', w.dataset.sid===sid));
}

function filterRows(sid, query){
  const q = query.trim().toLowerCase();
  const tbody = document.getElementById(`tbody-${sid}`);
  if (!tbody) return;
  let anyVisible = false;
  Array.from(tbody.children).forEach(tr=>{
    const nameInp = tr.querySelector('.f-name');
    const match = !q || (nameInp && nameInp.value.toLowerCase().includes(q));
    tr.style.display = match ? '' : 'none';
    if (match) anyVisible = true;
  });
  const emptyEl = document.getElementById(`empty-${sid}`);
  if (emptyEl) emptyEl.style.display = (q && !anyVisible) ? 'block' : 'none';
}

function updateProgress(sid){
  const el = document.getElementById(`progress-${sid}`);
  if (!el || !state[sid]) return;
  const items = Object.values(state[sid].items);
  const total = items.length;
  const filled = items.filter(i=>{ const q=Number(i.qty); return !isNaN(q) && q>0; }).length;
  el.textContent = total ? `${filled} из ${total} заполнено` : '';
}

/* ---------------- РЕДАКТИРОВАНИЕ / ДОБАВЛЕНИЕ / УДАЛЕНИЕ ПОСТАВЩИКА ---------------- */

let editingSectionId = null;

function openSectionEdit(sid){
  editingSectionId = sid;
  const isNew = !sid;
  const meta = isNew ? null : sectionMeta(sid);
  document.getElementById('section-modal-title').textContent = isNew ? 'Новый поставщик' : 'Изменить вкладку';
  document.getElementById('sec-label').value = meta ? meta.label : '';
  document.getElementById('sec-title').value = meta ? meta.title : '';
  document.getElementById('sec-sub').value = meta ? (meta.sub||'') : '';
  document.getElementById('sec-haslink').checked = meta ? !!meta.hasLink : false;
  document.getElementById('sec-delete-btn').style.display = isNew ? 'none' : 'inline-block';
  document.getElementById('section-modal').classList.add('open');
  setTimeout(()=>document.getElementById('sec-label').focus(), 80);
}

function closeSectionModal(){ document.getElementById('section-modal').classList.remove('open'); }

function saveSectionForm(){
  const labelEl = document.getElementById('sec-label');
  const label = labelEl.value.trim();
  if (!label) { labelEl.focus(); return; }
  const title = document.getElementById('sec-title').value.trim() || label;
  const sub = document.getElementById('sec-sub').value.trim();
  const hasLink = document.getElementById('sec-haslink').checked;

  if (editingSectionId) {
    const meta = sectionMeta(editingSectionId);
    const patch = { label, title, sub, hasLink };
    if (SYNC_CONFIGURED) {
      metaRef.child(editingSectionId).update(patch);
    } else {
      const updated = { ...meta, ...patch };
      updateSectionMeta(updated);
      saveMetaLocal();
    }
  } else {
    const id = 'c' + Date.now();
    const order = SECTIONS.reduce((m,s)=>Math.max(m, s.order||0), 0) + 1;
    const newMeta = { id, label, title, sub, hasLink, mode:'order', hasDeadline:false, order };
    if (SYNC_CONFIGURED) {
      const { id: _drop, ...metaData } = newMeta;
      metaRef.child(id).set(metaData);
    } else {
      buildSectionDOM(newMeta);
      state[id] = { items:{}, deadlineTime:'16:00', history:[] };
      localCounters[id] = 1000;
      saveMetaLocal();
      saveLocal();
      activateTab(id);
    }
  }
  closeSectionModal();
}

function deleteSectionConfirm(){
  if (!editingSectionId) return;
  const meta = sectionMeta(editingSectionId);
  const ok = confirm(`Удалить вкладку «${meta.label}»? Все позиции и история этой вкладки удалятся безвозвратно.`);
  if (!ok) return;
  const sid = editingSectionId;
  if (SYNC_CONFIGURED) {
    metaRef.child(sid).remove();
    firebase.database().ref('vnlOrder/sections/'+sid).remove();
    if (sectionRefs[sid]) { sectionRefs[sid].itemsRef.off(); if (sectionRefs[sid].settingsRef) sectionRefs[sid].settingsRef.off(); delete sectionRefs[sid]; }
  } else {
    removeSectionDOM(sid);
    delete state[sid];
    saveMetaLocal();
    saveLocal();
  }
  closeSectionModal();
}

/* ---------------- РЕНДЕР СТРОК ---------------- */

function updateQtyHighlight(tr, qty){
  const q = Number(qty);
  tr.classList.toggle('has-qty', !isNaN(q) && q>0);
}

function buildRow(sid, id, item){
  const tr = document.createElement('tr');
  tr.dataset.id = id;
  tr.dataset.order = item.order;

  const tdName = document.createElement('td');
  if (item.link) {
    const box = document.createElement('div');
    box.style.cssText = 'display:flex;align-items:center;gap:6px;padding:2px 10px 2px 0';
    const inp = document.createElement('input');
    inp.type='text'; inp.className='cell-input f-name'; inp.value=item.name; inp.style.flex='1';
    inp.addEventListener('change', ()=> commitField(sid,id,'name', inp.value.trim()||item.name));
    const a = document.createElement('a');
    a.href=item.link; a.target='_blank'; a.title=item.link;
    a.style.cssText='flex-shrink:0;color:var(--text3);display:flex;align-items:center';
    a.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>';
    box.appendChild(inp); box.appendChild(a);
    tdName.appendChild(box);
  } else {
    const inp = document.createElement('input');
    inp.type='text'; inp.className='cell-input f-name'; inp.value=item.name;
    inp.addEventListener('change', ()=> commitField(sid,id,'name', inp.value.trim()||item.name));
    tdName.appendChild(inp);
  }

  const tdUnit = document.createElement('td'); tdUnit.className='td-unit';
  const uInp = document.createElement('input');
  uInp.type='text'; uInp.className='cell-input f-unit'; uInp.value=item.unit;
  uInp.addEventListener('change', ()=> commitField(sid,id,'unit', uInp.value.trim()||item.unit));
  tdUnit.appendChild(uInp);

  const tdQty = document.createElement('td'); tdQty.className='td-qty';
  const qInp = document.createElement('input');
  qInp.type='number'; qInp.min='0'; qInp.value=item.qty||''; qInp.placeholder='0'; qInp.className='f-qty';
  qInp.addEventListener('input', ()=> { commitField(sid,id,'qty', qInp.value); updateQtyHighlight(tr, qInp.value); updateProgress(sid); });
  qInp.addEventListener('focus', ()=> qInp.select());
  tdQty.appendChild(qInp);

  const tdDel = document.createElement('td'); tdDel.className='td-del';
  const dBtn = document.createElement('button');
  dBtn.className='del-btn'; dBtn.title='Удалить';
  dBtn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
  dBtn.onclick = ()=> removeItem(sid,id);
  tdDel.appendChild(dBtn);

  tr.append(tdName, tdUnit, tdQty, tdDel);
  updateQtyHighlight(tr, item.qty);
  return tr;
}

function insertSorted(tbody, tr, order){
  const rows = Array.from(tbody.children);
  const next = rows.find(r => Number(r.dataset.order) > order);
  if (next) tbody.insertBefore(tr, next); else tbody.appendChild(tr);
}

function upsertRow(sid, id){
  const item = state[sid].items[id];
  if (!item) return;
  const tbody = document.getElementById(`tbody-${sid}`);
  if (!tbody) return;
  let tr = tbody.querySelector(`tr[data-id="${id}"]`);
  if (!tr) {
    tr = buildRow(sid, id, item);
    insertSorted(tbody, tr, item.order);
  } else {
    tr.dataset.order = item.order;
    const nameInp = tr.querySelector('.f-name');
    if (document.activeElement !== nameInp) nameInp.value = item.name;
    const unitInp = tr.querySelector('.f-unit');
    if (document.activeElement !== unitInp) unitInp.value = item.unit;
    const qtyInp = tr.querySelector('.f-qty');
    if (document.activeElement !== qtyInp) qtyInp.value = item.qty || '';
    updateQtyHighlight(tr, item.qty);
  }
  updateProgress(sid);
}

function removeRow(sid, id){
  const tbody = document.getElementById(`tbody-${sid}`);
  const tr = tbody && tbody.querySelector(`tr[data-id="${id}"]`);
  if (tr) tr.remove();
  updateProgress(sid);
}

/* ---------------- ЛОКАЛЬНЫЙ РЕЖИМ ---------------- */

function saveLocal(){
  try { localStorage.setItem(LOCAL_KEY, JSON.stringify(state)); } catch(e){}
}
function saveMetaLocal(){
  try { localStorage.setItem(META_KEY, JSON.stringify(SECTIONS)); } catch(e){}
}

function loadLocal(){
  let savedMeta = null, savedState = null;
  try { const rawMeta = localStorage.getItem(META_KEY); if (rawMeta) savedMeta = JSON.parse(rawMeta); } catch(e){}
  try { const raw = localStorage.getItem(LOCAL_KEY); if (raw) savedState = JSON.parse(raw); } catch(e){}

  const metaList = (savedMeta && savedMeta.length) ? savedMeta : DEFAULT_SECTIONS_META.map(m=>({...m}));
  metaList.sort((a,b)=>(a.order||0)-(b.order||0));

  metaList.forEach(meta=>{
    buildSectionDOM(meta);
    if (savedState && savedState[meta.id]) {
      state[meta.id] = savedState[meta.id];
      if (!state[meta.id].history) state[meta.id].history = [];
    } else {
      state[meta.id] = { items: DEFAULT_ITEMS[meta.id] ? seedSectionItems(meta.id) : {}, deadlineTime:'16:00', history:[] };
    }
    const orders = Object.values(state[meta.id].items).map(i=>i.order||0);
    localCounters[meta.id] = orders.length ? Math.max(...orders)+1 : 1000;
    Object.keys(state[meta.id].items).forEach(id=> upsertRow(meta.id, id));
    if (meta.hasDeadline) {
      const inp = document.getElementById(`deadline-${meta.id}`);
      if (inp) inp.value = state[meta.id].deadlineTime || '16:00';
    }
  });

  saveMetaLocal();
  setSyncStatus('local');
}

/* ---------------- FIREBASE РЕЖИМ ---------------- */

function attachSectionData(sid){
  if (sectionRefs[sid]) return;
  const meta = sectionMeta(sid);
  const base = firebase.database().ref('vnlOrder/sections/'+sid);
  const itemsRef = base.child('items');
  const settingsRef = base.child('settings');
  const historyRef = base.child('history');
  sectionRefs[sid] = { itemsRef, settingsRef, historyRef };
  state[sid] = { items:{}, deadlineTime:'16:00', history:[] };

  itemsRef.once('value').then(snap=>{
    if (!snap.exists() && DEFAULT_ITEMS[sid]) itemsRef.set(seedSectionItems(sid));
  });

  itemsRef.on('child_added', snap=>{ state[sid].items[snap.key]=snap.val(); upsertRow(sid, snap.key); });
  itemsRef.on('child_changed', snap=>{ state[sid].items[snap.key]=snap.val(); upsertRow(sid, snap.key); });
  itemsRef.on('child_removed', snap=>{ delete state[sid].items[snap.key]; removeRow(sid, snap.key); });

  if (meta && meta.hasDeadline) {
    settingsRef.on('value', snap=>{
      const v = snap.val();
      state[sid].deadlineTime = (v && v.deadlineTime) || '16:00';
      const inp = document.getElementById(`deadline-${sid}`);
      if (inp && document.activeElement !== inp) inp.value = state[sid].deadlineTime;
    });
    settingsRef.once('value').then(snap=>{
      if (!snap.exists()) settingsRef.set({ deadlineTime:'16:00' });
    });
  }
}

function initFirebase(){
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  metaRef = db.ref('vnlOrder/meta/sections');

  db.ref('.info/connected').on('value', snap=>{
    setSyncStatus(snap.val()===true ? 'online' : 'offline');
  });

  metaRef.once('value').then(snap=>{
    if (!snap.exists()) {
      const seed = {};
      DEFAULT_SECTIONS_META.forEach(m=>{ const { id, ...rest } = m; seed[id] = rest; });
      metaRef.set(seed);
    }
  });

  metaRef.on('child_added', snap=>{
    const meta = { id: snap.key, ...snap.val() };
    buildSectionDOM(meta);
    attachSectionData(meta.id);
  });
  metaRef.on('child_changed', snap=>{
    const meta = { id: snap.key, ...snap.val() };
    updateSectionMeta(meta);
  });
  metaRef.on('child_removed', snap=>{
    removeSectionDOM(snap.key);
    if (sectionRefs[snap.key]) {
      sectionRefs[snap.key].itemsRef.off();
      if (sectionRefs[snap.key].settingsRef) sectionRefs[snap.key].settingsRef.off();
      delete sectionRefs[snap.key];
    }
    delete state[snap.key];
  });
}

function setSyncStatus(mode){
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-text');
  if (mode==='online') { dot.className='sync-dot online'; txt.textContent='Синхронизировано'; }
  else if (mode==='offline') { dot.className='sync-dot offline'; txt.textContent='Офлайн — сохранится при подключении'; }
  else { dot.className='sync-dot local'; txt.textContent='Локально'; }
}

/* ---------------- ДЕЙСТВИЯ С ПОЗИЦИЯМИ ---------------- */

function commitField(sid, id, field, value){
  if (!state[sid] || !state[sid].items[id]) return;
  state[sid].items[id][field] = value;
  if (SYNC_CONFIGURED) sectionRefs[sid].itemsRef.child(id).child(field).set(value);
  else saveLocal();
}

function addItem(sid){
  const nameEl = document.getElementById(`nn-${sid}`);
  const unitEl = document.getElementById(`nu-${sid}`);
  const linkEl = document.getElementById(`nl-${sid}`);
  const name = nameEl.value.trim();
  if (!name) { nameEl.focus(); return; }
  const unit = unitEl.value.trim() || 'шт';
  const link = linkEl ? linkEl.value.trim() : '';

  if (SYNC_CONFIGURED) {
    const order = Object.values(state[sid].items).reduce((m,i)=>Math.max(m,i.order||0),0)+1;
    const newRef = sectionRefs[sid].itemsRef.push();
    newRef.set({ name, unit, qty:'', order, ...(link?{link}:{}) });
  } else {
    const id = 'u'+(localCounters[sid]++);
    state[sid].items[id] = { name, unit, qty:'', order: localCounters[sid], ...(link?{link}:{}) };
    upsertRow(sid, id);
    saveLocal();
  }
  nameEl.value=''; unitEl.value=''; if (linkEl) linkEl.value='';
}

function removeItem(sid, id){
  if (SYNC_CONFIGURED) sectionRefs[sid].itemsRef.child(id).remove();
  else { delete state[sid].items[id]; removeRow(sid,id); saveLocal(); }
}

function clearQty(sid){
  const meta = sectionMeta(sid);
  const ok = confirm(`Точно очистить все количества на вкладке «${meta.label}»? Список позиций останется, обнулятся только количества. Это нельзя отменить.`);
  if (!ok) return;
  Object.keys(state[sid].items).forEach(id=>{
    state[sid].items[id].qty = '';
    if (SYNC_CONFIGURED) sectionRefs[sid].itemsRef.child(id).child('qty').set('');
    else upsertRow(sid, id);
  });
  if (!SYNC_CONFIGURED) saveLocal();
  updateProgress(sid);
}

function onDeadlineChange(sid){
  const inp = document.getElementById(`deadline-${sid}`);
  state[sid].deadlineTime = inp.value || '16:00';
  if (SYNC_CONFIGURED) sectionRefs[sid].settingsRef.child('deadlineTime').set(state[sid].deadlineTime);
  else saveLocal();
}

function buildCopyText(sid){
  const meta = sectionMeta(sid);
  const items = Object.values(state[sid].items).sort((a,b)=>a.order-b.order);
  let lines;
  let count = 0;

  if (meta.mode === 'lift') {
    const time = state[sid].deadlineTime || '16:00';
    lines = [`Доброе утро, поднимите до ${time}, пожалуйста:`, ''];
    items.forEach(item=>{
      const q = Number(item.qty);
      if (!isNaN(q) && q>0) { lines.push(`${item.name} — ${q} ${item.unit}`); count++; }
    });
    if (lines.length===2) lines.push('Нет позиций с указанным количеством');
    lines.push(''); lines.push('Спасибо!');
  } else {
    const date = new Date().toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric' });
    lines = [`Заказ — ${date}`, ''];
    items.forEach(item=>{
      const q = item.qty;
      const hasQty = q!=='' && q!=null;
      if (!hasQty) return;
      const qNum = Number(q);
      if (isNaN(qNum) || qNum===0) return;
      lines.push(item.link ? `${item.name} | ${item.unit} | ${q} | ${item.link}` : `${item.name} | ${item.unit} | ${q}`);
      count++;
    });
    if (lines.length<=2) lines.push('Нет позиций с указанным количеством');
  }
  return { text: lines.join('\n'), count };
}

let modalContextSid = null;

function openCopy(sid){
  const meta = sectionMeta(sid);
  const { text, count } = buildCopyText(sid);
  modalContextSid = sid;

  document.getElementById('modal-title').textContent = meta.mode==='lift' ? 'Готовое сообщение' : `Заказ · ${meta.label}`;
  document.getElementById('modal-text').value = text;
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('modal-text').select(),80);

  if (SYNC_CONFIGURED) {
    sectionRefs[sid].historyRef.push({ text, count, at: firebase.database.ServerValue.TIMESTAMP });
  } else {
    if (!state[sid].history) state[sid].history = [];
    state[sid].history.unshift({ id:'h'+Date.now(), at: Date.now(), text, count });
    state[sid].history = state[sid].history.slice(0,50);
    saveLocal();
  }
}

function closeModal(){ document.getElementById('modal').classList.remove('open'); }
function copyModal(){
  const ta=document.getElementById('modal-text'); const btn=document.getElementById('modal-copy-btn'); ta.select();
  navigator.clipboard.writeText(ta.value).catch(()=>document.execCommand('copy'));
  btn.innerHTML = ICON_CHECK + ' Скопировано';
  setTimeout(()=>{ btn.innerHTML = ICON_COPY + ' Копировать'; }, 2000);

  if (modalContextSid) {
    const headerBtn = document.getElementById(`copy-btn-${modalContextSid}`);
    if (headerBtn) {
      headerBtn.classList.add('ok');
      headerBtn.innerHTML = ICON_CHECK + ' Скопировано';
      setTimeout(()=>{
        headerBtn.classList.remove('ok');
        headerBtn.innerHTML = ICON_COPY + ' Копировать';
      }, 2000);
    }
  }
}

/* ---------------- ИСТОРИЯ ЗАКАЗОВ ---------------- */

function renderHistoryList(sid, meta, entries){
  const listEl = document.getElementById('history-list');
  if (!entries.length) { listEl.innerHTML = '<div class="history-empty">Пока нет отправленных заказов</div>'; return; }
  const sorted = entries.slice().sort((a,b)=> (b.at||0)-(a.at||0));
  listEl.innerHTML = '';
  sorted.slice(0,50).forEach(entry=>{
    const item = document.createElement('div');
    item.className = 'history-item';
    const d = entry.at ? new Date(entry.at) : null;
    const dateStr = d ? d.toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
    const preview = (typeof entry.count === 'number')
      ? pluralPositions(entry.count)
      : ((entry.text||'').split('\n').find(l=>l.trim()) || '');
    item.innerHTML = `<div class="history-date">${dateStr}</div><div class="history-preview"></div>`;
    item.querySelector('.history-preview').textContent = preview;
    item.onclick = ()=> showHistoryText(sid, entry.text);
    listEl.appendChild(item);
  });
}

function openHistory(sid){
  const meta = sectionMeta(sid);
  document.getElementById('history-title').textContent = `История · ${meta.label}`;
  document.getElementById('history-list').innerHTML = '<div class="history-empty">Загрузка…</div>';
  document.getElementById('history-modal').classList.add('open');

  if (SYNC_CONFIGURED) {
    sectionRefs[sid].historyRef.once('value').then(snap=>{
      const val = snap.val() || {};
      renderHistoryList(sid, meta, Object.values(val));
    }).catch(()=> renderHistoryList(sid, meta, []));
  } else {
    renderHistoryList(sid, meta, state[sid].history || []);
  }
}

function showHistoryText(sid, text){
  modalContextSid = sid;
  const meta = sectionMeta(sid);
  document.getElementById('history-modal').classList.remove('open');
  document.getElementById('modal-title').textContent = `Заказ · ${meta.label}`;
  document.getElementById('modal-text').value = text;
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('modal-text').select(),80);
}

function closeHistory(){ document.getElementById('history-modal').classList.remove('open'); }

/* ---------------- УСТАНОВКА НА ГЛАВНЫЙ ЭКРАН ---------------- */

let deferredPrompt = null;
const INSTALL_DISMISS_KEY = 'vnl_install_dismissed_v1';

function isStandalone(){
  return (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone === true;
}
function isIOS(){ return /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase()); }
function installDismissed(){
  try { return localStorage.getItem(INSTALL_DISMISS_KEY) === '1'; } catch(e){ return false; }
}

function maybeShowInstallBanner(kind){
  if (isStandalone() || installDismissed()) return;
  const banner = document.getElementById('install-banner');
  const text = document.getElementById('install-text');
  const btn = document.getElementById('install-btn');
  if (kind === 'android') {
    text.textContent = 'Установи приложение на телефон — работает быстрее и открывается без браузера.';
    btn.style.display = 'inline-flex';
  } else {
    text.textContent = 'Добавь на экран «Домой»: кнопка «Поделиться» → «На экран Домой».';
    btn.style.display = 'none';
  }
  banner.style.display = 'flex';
}

function triggerInstall(){
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.finally(()=>{
    deferredPrompt = null;
    document.getElementById('install-banner').style.display = 'none';
  });
}

function dismissInstallBanner(){
  try { localStorage.setItem(INSTALL_DISMISS_KEY, '1'); } catch(e){}
  document.getElementById('install-banner').style.display = 'none';
}

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  maybeShowInstallBanner('android');
});

/* ---------------- СТАРТ ---------------- */

document.getElementById('pin-input').addEventListener('keydown', e=>{ if(e.key==='Enter') checkPin(); });
document.getElementById('modal').addEventListener('click', e=>{ if(e.target===document.getElementById('modal')) closeModal(); });
document.getElementById('history-modal').addEventListener('click', e=>{ if(e.target===document.getElementById('history-modal')) closeHistory(); });
document.getElementById('section-modal').addEventListener('click', e=>{ if(e.target===document.getElementById('section-modal')) closeSectionModal(); });

function startApp(){
  if (SYNC_CONFIGURED) {
    initFirebase();
  } else {
    document.getElementById('setup-notice').style.display = 'block';
    loadLocal();
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./service-worker.js');
  }

  setTimeout(()=>{ if (isIOS() && !isStandalone()) maybeShowInstallBanner('ios'); }, 1200);
}

let alreadyUnlocked = false;
try { alreadyUnlocked = localStorage.getItem(PIN_KEY) === '1'; } catch(e){}
if (alreadyUnlocked) unlockApp();
</script>
